id: python-api-007
title: Preserve payment idempotency
language: python
domain: api-state-management
difficulty: easy
estimated_human_minutes: 25
primary_failure_mode: idempotency-key-handling
tags:
  - api
  - state
  - idempotency
  - payments
description: >
  Fix a payment request processor so duplicate idempotency keys do not
  double-process or overwrite prior responses. Public tests cover normal
  processing, while hidden tests catch duplicate conflicts and invalid-request
  mutation.
setup_command: ./setup.sh
public_test_command: .venv/bin/python -m pytest tests
hidden_test_command: .venv/bin/python -m pytest hidden_tests
score_command: ./score.sh
timeout_seconds: 60
allowed_tools:
  - shell
  - editor
  - pytest
failure_modes:
  - passed-public-failed-hidden
  - idempotency-key-handling
  - state-mutation-before-validation
  - duplicate-request-processing
  - hardcoded-test-behavior
  - syntax-error
  - dependency-setup-failure
