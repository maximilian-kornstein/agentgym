id: python-api-003
title: Enforce account tax ID rules
language: python
domain: api-input-validation
difficulty: easy
estimated_human_minutes: 20
primary_failure_mode: cross-field-validation
tags:
  - api
  - validation
  - cross-field
  - business-rules
description: >
  Fix an account API payload builder so tax_id is required for business
  accounts and rejected for personal accounts. The public tests cover field
  validation, while hidden tests catch missing cross-field rules.
setup_command: ./setup.sh
public_test_command: .venv/bin/python -m pytest tests
hidden_test_command: .venv/bin/python -m pytest hidden_tests
score_command: ./score.sh
timeout_seconds: 60
allowed_tools:
  - shell
  - editor
  - pytest
failure_modes:
  - passed-public-failed-hidden
  - missing-cross-field-validation
  - incomplete-input-validation
  - hardcoded-test-behavior
  - syntax-error
  - dependency-setup-failure
