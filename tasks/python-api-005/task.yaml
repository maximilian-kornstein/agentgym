id: python-api-005
title: Enforce search pagination bounds
language: python
domain: api-input-validation
difficulty: easy
estimated_human_minutes: 20
primary_failure_mode: pagination-boundary-validation
tags:
  - api
  - validation
  - pagination
  - search
description: >
  Fix a search API payload builder so query, pagination, and sort inputs obey
  the public API contract. Public tests cover normal defaults and obvious type
  errors, while hidden tests catch boundary values, numeric string coercion, and
  unsupported sort options.
setup_command: ./setup.sh
public_test_command: .venv/bin/python -m pytest tests
hidden_test_command: .venv/bin/python -m pytest hidden_tests
score_command: ./score.sh
timeout_seconds: 60
allowed_tools:
  - shell
  - editor
  - pytest
failure_modes:
  - passed-public-failed-hidden
  - incomplete-boundary-validation
  - over-permissive-type-coercion
  - enum-validation-bypass
  - hardcoded-test-behavior
  - syntax-error
  - dependency-setup-failure
